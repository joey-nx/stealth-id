[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true

# Remappings
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "forge-std/=lib/forge-std/src/",
    "erc8004/=src/erc8004/",
]

# Gas reporting
gas_reports = ["*"]

# Allow deploy script to write deployment artifacts
fs_permissions = [{ access = "read-write", path = "./deployments" }]

# Local Anvil
[rpc_endpoints]
local = "http://127.0.0.1:8545"
